<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">ВолжскийАктив</div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="about.html">О проекте</a>
            <a href="add.html">Добавить кружок</a>
        </nav>
    </header>
    <main>
        <div class="container">
            <h1>Каталог занятий</h1>
            <div class="filters">
                <input id="search" placeholder="Поиск по названию...">
                <select id="category">
                    <option value="">Все категории</option>
                    <option>Спорт</option>
                    <option>Программирование</option>
                    <option>Музыка</option>
                    <option>Иностранные языки</option>
                    <option>Творчество</option>
                </select>
            </div>
            <div id="list" class="cards"></div>
        </div>
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modal-title"></h2>
                <div id="modal-body"></div>
                <button id="signup-btn" class="btn">Записаться</button>
                <p id="modal-message" class="success-message"></p>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>ВолжскийАктив</h4>
                <p>Каталог кружков и секций города</p>
                <p>Помогаем найти занятие по душе</p>
            </div>
            <div class="footer-section">
                <h4>Навигация</h4>
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="about.html">О проекте</a>
                <a href="add.html">Добавить кружок</a>
            </div>
            <div class="footer-section">
                <h4>Контакты</h4>
                <p>Email: info@volzhkyAktiv.ru</p>
                <p>Телефон: +7 (999) 123-45-67</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>ВолжскийАктив  2026.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
